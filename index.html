<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>S99 Agency — Reporting Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy: #32475e;
    --navy-deep: #263647;
    --teal: #70c8b1;
    --sky: #6cc8f0;
    --bg: #ffffff;
    --bg-soft: #f6f8f9;
    --bubble-bot: #f1f4f5;
    --text: #22303c;
    --muted: #8593a0;
    --border: #e7ebee;
  }

  html, body {
    height: 100%; height: 100dvh;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #ffffff;
    overflow: hidden;
  }

  body { display: flex; flex-direction: column; }

  .shell {
    width: 100%; height: 100%; height: 100dvh;
    display: flex; flex-direction: column;
    overflow: hidden;
    background: var(--bg);
    position: relative;
  }

  @media (min-width: 600px) {
    body { align-items: center; justify-content: center; background: #ffffff; }
    .shell {
      max-width: 420px;
      height: 92vh; max-height: 820px; min-height: 500px;
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 8px 40px rgba(50,71,94,0.10), 0 2px 8px rgba(50,71,94,0.06);
    }
  }

  /* ─── HEADER ─── */
  .hdr {
    background: #ffffff;
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 12px;
    padding-top: calc(14px + env(safe-area-inset-top));
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .hdr-icon-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); padding: 4px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .hdr-icon-btn:hover { background: var(--bg-soft); color: var(--navy); }
  .hdr-icon-btn svg { width: 19px; height: 19px; }

  .hdr-logo {
    width: 40px; height: 40px; border-radius: 11px;
    flex-shrink: 0; overflow: hidden;
    background: var(--navy);
    display: flex; align-items: center; justify-content: center;
  }
  .hdr-logo svg { width: 100%; height: 100%; }

  .hdr-info { flex: 1; min-width: 0; }
  .hdr-name {
    font-size: 15px; font-weight: 700;
    color: var(--navy); letter-spacing: -0.01em; line-height: 1.2;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .hdr-status-row {
    display: flex; align-items: center; gap: 5px; margin-top: 3px;
  }
  .hdr-status-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--teal);
    flex-shrink: 0;
  }
  .hdr-status-text {
    font-size: 10.5px; font-weight: 500; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ─── SUBHEADER: connected sources ─── */
  .subhdr {
    background: var(--bg-soft);
    border-bottom: 1px solid var(--border);
    padding: 7px 16px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .subhdr::-webkit-scrollbar { display: none; }
  .src-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 10.5px; color: var(--navy); font-weight: 500;
    white-space: nowrap; flex-shrink: 0;
  }
  .src-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--teal); flex-shrink: 0; }

  /* ─── SIDEBAR (chat history) ─── */
  .sidebar-backdrop {
    position: absolute; inset: 0; background: rgba(38,54,71,0.35);
    opacity: 0; pointer-events: none; transition: opacity 0.22s ease;
    z-index: 20; border-radius: inherit;
  }
  .sidebar-backdrop.open { opacity: 1; pointer-events: auto; }

  .sidebar {
    position: absolute; top: 0; left: 0; bottom: 0;
    width: 82%; max-width: 320px;
    background: #ffffff;
    border-right: 1px solid var(--border);
    transform: translateX(-100%);
    transition: transform 0.24s cubic-bezier(.4,0,.2,1);
    z-index: 21; display: flex; flex-direction: column;
    border-top-left-radius: inherit; border-bottom-left-radius: inherit;
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-hdr {
    padding: 16px 14px 12px;
    padding-top: calc(16px + env(safe-area-inset-top));
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-title { font-size: 14px; font-weight: 700; color: var(--navy); }
  .new-chat-btn {
    margin: 12px 14px 6px;
    background: var(--navy); color: #fff; border: none;
    border-radius: 10px; padding: 10px 12px;
    font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif;
    cursor: pointer; display: flex; align-items: center; gap: 6px; justify-content: center;
    transition: opacity 0.15s;
  }
  .new-chat-btn:hover { opacity: 0.9; }
  .session-list { flex: 1; overflow-y: auto; padding: 4px 8px 12px; }
  .session-item {
    padding: 10px 10px; border-radius: 10px; cursor: pointer;
    display: flex; flex-direction: column; gap: 2px;
    transition: background 0.14s; margin-bottom: 2px;
  }
  .session-item:hover { background: var(--bg-soft); }
  .session-item.active { background: #e9f6f1; }
  .session-item-title {
    font-size: 12.5px; font-weight: 600; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .session-item-preview {
    font-size: 11px; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .session-item-time { font-size: 9.5px; color: var(--muted); margin-top: 1px; }
  .session-empty {
    padding: 30px 16px; text-align: center; color: var(--muted); font-size: 12px; line-height: 1.6;
  }

  /* ─── MESSAGES ─── */
  .msgs {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding: 16px 14px 8px;
    display: flex; flex-direction: column; gap: 14px;
    overscroll-behavior: contain;
    background: #ffffff;
  }
  .msgs::-webkit-scrollbar { width: 4px; }
  .msgs::-webkit-scrollbar-thumb { background: rgba(50,71,94,0.12); border-radius: 2px; }

  .date-pill {
    text-align: center; font-size: 11px; color: var(--muted);
    font-weight: 500; letter-spacing: 0.02em;
    padding: 2px 0 4px;
  }

  .agent-row { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; }
  .agent-row-av {
    width: 26px; height: 26px; border-radius: 8px;
    overflow: hidden; flex-shrink: 0; background: var(--navy);
    display: flex; align-items: center; justify-content: center;
  }
  .agent-row-av svg { width: 100%; height: 100%; }
  .agent-row-name { font-size: 11.5px; font-weight: 700; color: var(--navy); letter-spacing: 0.01em; }
  .agent-row-time { font-size: 10px; color: var(--muted); margin-left: auto; }

  .msg-group { animation: fadeUp 0.22s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .msg { display: flex; gap: 8px; margin-bottom: 4px; }
  .msg.u { flex-direction: row-reverse; }

  .u-av {
    width: 26px; height: 26px; border-radius: 8px;
    flex-shrink: 0; background: var(--sky);
    color: #fff; font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    align-self: flex-end;
  }

  .bub-col { display: flex; flex-direction: column; max-width: 78%; }
  .bub-col.u { align-items: flex-end; }

  .bub {
    padding: 10px 14px;
    border-radius: 16px; font-size: 14px;
    line-height: 1.6; word-break: break-word;
  }
  .bub.b { background: var(--bubble-bot); color: var(--text); border-top-left-radius: 4px; }
  .bub.u { background: var(--navy); color: #fff; border-top-right-radius: 4px; }

  .bub.b strong { color: var(--navy); font-weight: 600; }
  .bub.b em { font-style: italic; color: var(--muted); }
  .bub.b ul, .bub.b ol { margin: 6px 0 4px 18px; }
  .bub.b li { margin-bottom: 4px; line-height: 1.55; }
  .bub.b p { margin-bottom: 6px; }
  .bub.b p:last-child { margin-bottom: 0; }
  .bub.b h3 { font-size: 14px; font-weight: 700; color: var(--navy); margin: 7px 0 4px; }
  .bub.b a { color: var(--navy); text-decoration: underline; word-break: break-all; }
  .bub.b code { background: #e8eaed; color: var(--text); border-radius: 4px; padding: 1px 5px; font-size: 12px; font-family: monospace; }
  .bub.b blockquote { border-left: 3px solid var(--teal); padding-left: 10px; margin: 6px 0; color: var(--muted); font-style: italic; }
  .bub.b hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }

  /* meta row: timestamp + source badge, under each bubble */
  .bub-meta {
    display: flex; align-items: center; gap: 6px;
    margin-top: 4px; padding: 0 2px;
  }
  .bub-col.u .bub-meta { flex-direction: row-reverse; }
  .meta-time { font-size: 10px; color: var(--muted); }
  .source-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 9.5px; font-weight: 600; color: var(--navy);
    background: #e9f6f1; padding: 2px 7px; border-radius: 20px;
    letter-spacing: 0.02em;
  }
  .source-badge .src-dot2 { width: 5px; height: 5px; border-radius: 50%; background: var(--teal); }

  /* ─── OPTION PILLS ─── */
  .options-wrap {
    margin-top: 4px; display: flex; flex-wrap: wrap; gap: 7px;
    animation: fadeUp 0.25s ease 0.1s both;
  }
  .opt-pill {
    background: #fff; border: 1.5px solid var(--navy); color: var(--navy);
    font-size: 13px; font-weight: 500; padding: 7px 15px; border-radius: 50px;
    cursor: pointer; transition: all 0.16s; -webkit-tap-highlight-color: transparent;
    white-space: normal; text-align: center; line-height: 1.35; font-family: 'Inter', sans-serif;
  }
  .opt-pill:hover { background: var(--navy); color: #fff; }
  .opt-pill:active { transform: scale(0.97); }
  .opt-pill:disabled { opacity: 0.45; cursor: not-allowed; border-color: var(--muted); color: var(--muted); }

  /* ─── TYPING ─── */
  .tdots {
    display: flex; gap: 4px; align-items: center; padding: 11px 16px;
    background: var(--bubble-bot); border-radius: 16px; border-top-left-radius: 4px;
    width: fit-content;
  }
  .d { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; opacity: 0.7; animation: bop 1.2s infinite; }
  .d:nth-child(2) { animation-delay: .2s; }
  .d:nth-child(3) { animation-delay: .4s; }
  @keyframes bop { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

  .bub.err { background: #fdeeee; color: #c5221f; border-top-left-radius: 4px; }
  .retry-btn {
    display: inline-block; margin-top: 6px; background: #fff; border: 1px solid #f2b3b0;
    color: #c5221f; font-size: 12px; padding: 4px 10px; border-radius: 12px; cursor: pointer;
    font-family: 'Inter', sans-serif; transition: background 0.15s;
  }
  .retry-btn:hover { background: #c5221f; color: #fff; }

  /* ─── INPUT AREA ─── */
  .inp-area {
    padding: 10px 14px; padding-bottom: calc(10px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--border); background: #fff; flex-shrink: 0;
  }
  .inp-row {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-soft); border: 1.5px solid transparent;
    border-radius: 26px; padding: 9px 10px 9px 16px;
    transition: border-color 0.2s, background 0.2s;
  }
  .inp-row:focus-within { border-color: var(--navy); background: #fff; box-shadow: 0 0 0 3px rgba(50,71,94,0.08); }
  .inp-icon-btn {
    background: none; border: none; cursor: pointer; color: var(--muted); padding: 2px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    transition: color 0.15s; -webkit-tap-highlight-color: transparent;
  }
  .inp-icon-btn:hover { color: var(--navy); }
  .inp-icon-btn svg { width: 18px; height: 18px; }
  .inp-row input {
    flex: 1; background: none; border: none; outline: none; color: var(--text);
    font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 400; caret-color: var(--navy); min-width: 0;
  }
  .inp-row input::placeholder { color: var(--muted); }

  .mic-btn {
    width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer;
    background: var(--bg-soft); color: var(--navy); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.12s; -webkit-tap-highlight-color: transparent;
    position: relative;
  }
  .mic-btn svg { width: 17px; height: 17px; }
  .mic-btn.recording { background: #e6534d; color: #fff; }
  .mic-btn.recording::after {
    content: ''; position: absolute; inset: -5px; border-radius: 50%;
    border: 2px solid #e6534d; opacity: 0.5; animation: pulseRing 1.1s infinite;
  }
  @keyframes pulseRing { 0% { transform: scale(0.9); opacity: 0.6; } 100% { transform: scale(1.35); opacity: 0; } }

  .send-btn {
    width: 36px; height: 36px; border-radius: 50%; background: var(--navy); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.15s, transform 0.12s; flex-shrink: 0; -webkit-tap-highlight-color: transparent;
  }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .send-btn:not(:disabled):active { opacity: 0.8; transform: scale(0.94); }
  .send-btn svg { width: 16px; height: 16px; }

  .recording-hint {
    text-align: center; font-size: 11px; color: #e6534d; font-weight: 500;
    margin-top: 6px; opacity: 0; transition: opacity 0.15s;
  }
  .recording-hint.show { opacity: 1; }

  .inp-footer {
    text-align: center; margin-top: 6px; font-size: 10px;
    color: var(--muted); letter-spacing: 0.01em;
  }
  .inp-footer a { color: var(--navy); text-decoration: none; font-weight: 600; }
  .inp-footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="shell">

  <!-- SIDEBAR: CHAT HISTORY -->
  <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-hdr">
      <div class="sidebar-title">Chat history</div>
      <button class="hdr-icon-btn" onclick="closeSidebar()" aria-label="Close history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <button class="new-chat-btn" onclick="startNewChat()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      New chat
    </button>
    <div class="session-list" id="session-list"></div>
  </div>

  <!-- HEADER -->
  <div class="hdr">
    <button class="hdr-icon-btn" onclick="openSidebar()" aria-label="Chat history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <div class="hdr-logo">
      <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
        <rect width="40" height="40" rx="11" fill="#32475E"/>
        <text x="20" y="25" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#ffffff">S99</text>
        <circle cx="30.5" cy="10.5" r="3.2" fill="#70C8B1"/>
      </svg>
    </div>
    <div class="hdr-info">
      <div class="hdr-name">S99 Agency Reporting Assistant</div>
      <div class="hdr-status-row">
        <span class="hdr-status-dot"></span>
        <span class="hdr-status-text">Connected · Live data</span>
      </div>
    </div>
    <button class="hdr-icon-btn" onclick="refreshChat()" aria-label="New chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
    </button>
  </div>

  <!-- SUBHEADER: connected sources -->
  <div class="subhdr" id="subhdr">
    <div class="src-item"><span class="src-dot"></span>Slack</div>
    <div class="src-item"><span class="src-dot"></span>GoHighLevel</div>
    <div class="src-item"><span class="src-dot"></span>Airtable</div>
    <div class="src-item"><span class="src-dot"></span>Gmail</div>
    <div class="src-item"><span class="src-dot"></span>Calendar</div>
  </div>

  <!-- MESSAGES -->
  <div class="msgs" id="msgs"></div>

  <!-- INPUT AREA -->
  <div class="inp-area">
    <div class="inp-row">
      <button class="inp-icon-btn" aria-label="Attachment">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <input
        type="text" id="inp" placeholder="Ask about leads, campaigns, or client activity…"
        onkeydown="onKey(event)"
        autocomplete="off" autocorrect="off" autocapitalize="sentences"
      />
      <button class="mic-btn" id="mic-btn" aria-label="Hold to record voice message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
        </svg>
      </button>
      <button class="send-btn" id="send-btn" onclick="send()" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M5 12h14M13 6l6 6-6 6" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="recording-hint" id="recording-hint">● Recording… release to send, drag up to cancel</div>
    <div class="inp-footer">Powered by <a href="https://botyama.com" target="_blank" rel="noopener">botyama.com</a></div>
  </div>

</div>

<script>
  /* ═══════════════════════════════════
     CONFIG — UPDATE THESE
  ═══════════════════════════════════ */
  const WEBHOOK_URL = 'https://ai.botyama.com/webhook/S99-REPORTING-AGENT';

  /* ═══════════════════════════════════
     SESSION / HISTORY STORAGE
     Sessions are persisted in localStorage so Chris (or any
     client user) can reopen any previous conversation.
     Swap this for a webhook call (action:'list_sessions' /
     'get_session') if you want history synced server-side.
  ═══════════════════════════════════ */
  const SESSIONS_KEY = 's99_reporting_sessions';
  let isBusy = false;
  let lastUserMessage = '';
  let currentSession = null; // { id, createdAt, title, messages: [] }

  function loadSessions() {
    try { return JSON.parse(localStorage.getItem(SESSIONS_KEY)) || []; }
    catch { return []; }
  }
  function saveSessions(list) {
    try { localStorage.setItem(SESSIONS_KEY, JSON.stringify(list)); } catch {}
  }
  function persistCurrentSession() {
    if (!currentSession) return;
    const list = loadSessions();
    const idx = list.findIndex(s => s.id === currentSession.id);
    if (idx >= 0) list[idx] = currentSession; else list.unshift(currentSession);
    saveSessions(list);
  }
  function newSessionId() {
    return 's99_' + Math.random().toString(36).slice(2, 11) + '_' + Date.now();
  }

  /* ═══════════════════════════════════
     OPENING OPTIONS
  ═══════════════════════════════════ */
  const STARTER_OPTIONS = [
    "What happened across our channels today?",
    "Show me this week's new leads",
    "Pull the GHL pipeline status",
    "Summarize the latest client activity"
  ];

  const FOLLOWUP_SETS = [
    [ "Break that down by client", "Show the source for this", "What needs my attention?", "Compare to last week" ],
    [ "Show open tasks", "Any flagged messages?", "Pull the latest report", "Summarize by channel" ],
    [ "What changed since yesterday?", "Show pipeline movement", "Any client at risk?", "Give me the daily digest" ]
  ];
  let followupIndex = 0;
  function getFollowupOptions() {
    const opts = FOLLOWUP_SETS[followupIndex % FOLLOWUP_SETS.length];
    followupIndex++;
    return opts;
  }

  /* ═══════════════════════════════════
     SOURCE BADGE MAPPING
  ═══════════════════════════════════ */
  function sourceLabel(src) {
    if (!src) return null;
    const map = {
      slack: 'Slack', ghl: 'GoHighLevel', gohighlevel: 'GoHighLevel',
      airtable: 'Airtable', gmail: 'Gmail', email: 'Gmail',
      calendar: 'Calendar', 'google calendar': 'Calendar'
    };
    const key = String(src).toLowerCase().trim();
    return map[key] || src;
  }

  /* ═══════════════════════════════════
     MARKDOWN PARSER
  ═══════════════════════════════════ */
  function parseMarkdown(raw) {
    let h = raw;
    h = h.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    h = h.replace(/^### (.+)$/gm,'<h3>$1</h3>');
    h = h.replace(/^## (.+)$/gm,'<h3>$1</h3>');
    h = h.replace(/^# (.+)$/gm,'<h3>$1</h3>');
    h = h.replace(/^---+$/gm,'<hr>');
    h = h.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
    h = h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    h = h.replace(/__(.+?)__/g,'<strong>$1</strong>');
    h = h.replace(/\*(.+?)\*/g,'<em>$1</em>');
    h = h.replace(/_(.+?)_/g,'<em>$1</em>');
    h = h.replace(/`(.+?)`/g,'<code>$1</code>');
    h = h.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
    h = h.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
    h = h.replace(/(?<!["\(>])(https?:\/\/[^\s<"'\)\]]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
    h = h.replace(/^[\-\*] (.+)$/gm,'<li>$1</li>');
    h = h.replace(/(<li>.*<\/li>\n?)+/g,(b)=>'<ul>'+b+'</ul>');
    h = h.replace(/^\d+\. (.+)$/gm,'<oli>$1</oli>');
    h = h.replace(/(<oli>.*<\/oli>\n?)+/g,(b)=>'<ol>'+b.replace(/<\/?oli>/g,t=>t==='<oli>'?'<li>':'</li>')+'</ol>');
    h = h.replace(/\n{2,}/g,'\n\n');
    h = h.split('\n\n').map(l=>{
      const t=l.trim();
      if(!t) return '';
      if(/^<(h[1-3]|ul|ol|blockquote|hr|li)/.test(t)) return t;
      return '<p>'+t.replace(/\n/g,'<br>')+'</p>';
    }).filter(Boolean).join('\n');
    return h;
  }

  /* ═══════════════════════════════════
     UTILITIES
  ═══════════════════════════════════ */
  function scrollB() {
    const el = document.getElementById('msgs');
    setTimeout(()=>{ el.scrollTop = el.scrollHeight; }, 40);
  }
  function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function getTime(ts) { return new Date(ts || Date.now()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }
  function getDateLabel(ts) { return new Date(ts || Date.now()).toLocaleDateString([], {weekday:'long', month:'long', day:'numeric'}); }

  function setBusy(state) {
    isBusy = state;
    document.getElementById('send-btn').disabled = state;
    document.getElementById('inp').disabled = state;
    document.querySelectorAll('.opt-pill').forEach(b => b.disabled = state);
  }
  function removeOptions(id) { document.getElementById(id)?.remove(); }

  function agentRowHTML(ts) {
    return `
      <div class="agent-row">
        <div class="agent-row-av">
          <svg viewBox="0 0 26 26" xmlns="http://www.w3.org/2000/svg">
            <rect width="26" height="26" rx="8" fill="#32475E"/>
            <text x="13" y="17" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="#ffffff">S99</text>
          </svg>
        </div>
        <span class="agent-row-name">S99 Assistant</span>
        <span class="agent-row-time">${getTime(ts)}</span>
      </div>`;
  }

  /* ═══════════════════════════════════
     RENDER OPENING
  ═══════════════════════════════════ */
  function renderOpening() {
    const m = document.getElementById('msgs');
    m.innerHTML = '';

    const dp = document.createElement('div');
    dp.className = 'date-pill';
    dp.textContent = getDateLabel();
    m.appendChild(dp);

    const grp = document.createElement('div');
    grp.className = 'msg-group';
    grp.id = 'opening-group';
    grp.innerHTML = `
      ${agentRowHTML()}
      <div class="msg">
        <div class="bub-col">
          <div class="bub b">
            <p>Hi, I'm the S99 Reporting Assistant.</p>
            <p>Ask me anything about your campaigns, leads, or client activity — I pull live data from Slack, GoHighLevel, Airtable, and more.</p>
          </div>
        </div>
      </div>
    `;
    m.appendChild(grp);

    const optsDiv = document.createElement('div');
    optsDiv.className = 'options-wrap';
    optsDiv.id = 'starter-options';
    STARTER_OPTIONS.forEach(label => {
      const btn = document.createElement('button');
      btn.className = 'opt-pill';
      btn.textContent = label;
      btn.onclick = () => { removeOptions('starter-options'); sendMessage(label); };
      optsDiv.appendChild(btn);
    });
    m.appendChild(optsDiv);
    scrollB();
  }

  /* ═══════════════════════════════════
     APPEND USER MESSAGE
  ═══════════════════════════════════ */
  function appendUser(txt, ts) {
    const m = document.getElementById('msgs');
    const grp = document.createElement('div');
    grp.className = 'msg-group';
    grp.innerHTML = `
      <div class="msg u">
        <div class="u-av">👤</div>
        <div class="bub-col u">
          <div class="bub u">${escHtml(txt)}</div>
          <div class="bub-meta"><span class="meta-time">${getTime(ts)}</span></div>
        </div>
      </div>`;
    m.appendChild(grp);
    scrollB();
  }

  /* ═══════════════════════════════════
     APPEND TYPING INDICATOR
  ═══════════════════════════════════ */
  function appendTyping() {
    const m = document.getElementById('msgs');
    const id = 'ty' + Date.now();
    const grp = document.createElement('div');
    grp.id = id; grp.className = 'msg-group';
    grp.innerHTML = `
      ${agentRowHTML()}
      <div class="msg"><div class="tdots"><div class="d"></div><div class="d"></div><div class="d"></div></div></div>`;
    m.appendChild(grp);
    scrollB();
    return id;
  }

  /* ═══════════════════════════════════
     APPEND BOT MESSAGE + SOURCE BADGE + OPTIONS
  ═══════════════════════════════════ */
  function appendBot(rawContent, options, source, ts) {
    const m = document.getElementById('msgs');
    const optId = 'opts_' + Date.now();
    const label = sourceLabel(source);

    const grp = document.createElement('div');
    grp.className = 'msg-group';
    grp.innerHTML = `
      ${agentRowHTML(ts)}
      <div class="msg">
        <div class="bub-col">
          <div class="bub b">${parseMarkdown(rawContent)}</div>
          <div class="bub-meta">
            <span class="meta-time">${getTime(ts)}</span>
            ${label ? `<span class="source-badge"><span class="src-dot2"></span>via ${escHtml(label)}</span>` : ''}
          </div>
        </div>
      </div>`;
    m.appendChild(grp);

    const pillOptions = (Array.isArray(options) && options.length > 0) ? options : getFollowupOptions();
    const optsDiv = document.createElement('div');
    optsDiv.className = 'options-wrap';
    optsDiv.id = optId;
    pillOptions.forEach(label2 => {
      const btn = document.createElement('button');
      btn.className = 'opt-pill';
      btn.textContent = label2;
      btn.onclick = () => { removeOptions(optId); sendMessage(label2); };
      optsDiv.appendChild(btn);
    });
    m.appendChild(optsDiv);
    scrollB();
  }

  /* ═══════════════════════════════════
     ERROR
  ═══════════════════════════════════ */
  function appendError() {
    const m = document.getElementById('msgs');
    const grp = document.createElement('div');
    grp.className = 'msg-group';
    grp.innerHTML = `
      ${agentRowHTML()}
      <div class="msg">
        <div class="bub-col">
          <div class="bub err">
            Sorry, there was a connection issue. Please try again.
            <br><button class="retry-btn" onclick="retry()">↺ Retry</button>
          </div>
        </div>
      </div>`;
    m.appendChild(grp);
    scrollB();
  }
  function retry() {
    if (!lastUserMessage || isBusy) return;
    document.querySelectorAll('.bub.err').forEach(e => e.closest('.msg-group')?.remove());
    sendMessage(lastUserMessage);
  }

  /* ═══════════════════════════════════
     CHAT HISTORY SIDEBAR
  ═══════════════════════════════════ */
  function openSidebar() {
    renderSidebarList();
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebar-backdrop').classList.add('open');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-backdrop').classList.remove('open');
  }

  function renderSidebarList() {
    const list = loadSessions();
    const box = document.getElementById('session-list');
    box.innerHTML = '';
    if (!list.length) {
      box.innerHTML = '<div class="session-empty">No previous conversations yet.<br>Start chatting and they\\'ll show up here.</div>';
      return;
    }
    list
      .sort((a, b) => b.createdAt - a.createdAt)
      .forEach(sess => {
        const lastMsg = sess.messages[sess.messages.length - 1];
        const item = document.createElement('div');
        item.className = 'session-item' + (currentSession && sess.id === currentSession.id ? ' active' : '');
        item.innerHTML = `
          <div class="session-item-title">${escHtml(sess.title || 'New conversation')}</div>
          <div class="session-item-preview">${escHtml(lastMsg ? lastMsg.text : '')}</div>
          <div class="session-item-time">${new Date(sess.createdAt).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}</div>
        `;
        item.onclick = () => openSession(sess.id);
        box.appendChild(item);
      });
  }

  function openSession(id) {
    const list = loadSessions();
    const sess = list.find(s => s.id === id);
    if (!sess) return;
    currentSession = sess;
    const m = document.getElementById('msgs');
    m.innerHTML = '';
    const dp = document.createElement('div');
    dp.className = 'date-pill';
    dp.textContent = getDateLabel(sess.createdAt);
    m.appendChild(dp);
    sess.messages.forEach(msg => {
      if (msg.role === 'user') appendUser(msg.text, msg.ts);
      else appendBot(msg.text, null, msg.source, msg.ts);
    });
    // remove trailing follow-up option pills from replay — resume with fresh options only after new send
    document.querySelectorAll('.options-wrap').forEach(el => el.remove());
    closeSidebar();
    scrollB();
  }

  function startNewChat() {
    currentSession = { id: newSessionId(), createdAt: Date.now(), title: '', messages: [] };
    renderOpening();
    closeSidebar();
  }
  function refreshChat() { startNewChat(); }

  /* ═══════════════════════════════════
     SEND LOGIC
  ═══════════════════════════════════ */
  function onKey(e) { if (e.key === 'Enter' && !isBusy) send(); }

  function send() {
    const inp = document.getElementById('inp');
    const txt = inp.value.trim();
    if (!txt || isBusy) return;
    inp.value = ''; inp.focus();
    sendMessage(txt);
  }

  async function sendMessage(txt, isVoice) {
    if (isBusy) return;
    lastUserMessage = txt;
    setBusy(true);
    const userTs = Date.now();
    appendUser(txt, userTs);

    if (!currentSession) currentSession = { id: newSessionId(), createdAt: Date.now(), title: '', messages: [] };
    if (!currentSession.title) currentSession.title = txt.slice(0, 60);
    currentSession.messages.push({ role: 'user', text: txt, ts: userTs });
    persistCurrentSession();

    const tid = appendTyping();
    scrollB();

    try {
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: txt,
          source: 's99_reporting_chatbot',
          sessionId: currentSession.id,
          action: isVoice ? 'voice_message' : 'chat'
        })
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      document.getElementById(tid)?.remove();

      const reply = data.message || data.reply || data.output || data.text || 'Here\\'s what I found.';
      const botTs = Date.now();
      appendBot(reply, data.buttons, data.source, botTs);

      currentSession.messages.push({ role: 'bot', text: reply, source: data.source, ts: botTs });
      persistCurrentSession();

    } catch (err) {
      document.getElementById(tid)?.remove();
      appendError();
    } finally {
      setBusy(false);
      document.getElementById('inp').focus();
    }
  }

  /* ═══════════════════════════════════
     VOICE RECORDING — hold to speak
  ═══════════════════════════════════ */
  let mediaRecorder = null;
  let audioChunks = [];
  let recordStartTime = 0;
  let recordingCanceled = false;
  const MIN_RECORD_MS = 350;

  function blobToBase64(blob) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onloadend = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  }

  async function startRecording() {
    if (isBusy) return;
    recordingCanceled = false;
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        const elapsed = Date.now() - recordStartTime;
        if (recordingCanceled || elapsed < MIN_RECORD_MS) return;
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        await sendVoiceMessage(blob);
      };
      mediaRecorder.start();
      recordStartTime = Date.now();
      document.getElementById('mic-btn').classList.add('recording');
      document.getElementById('recording-hint').classList.add('show');
    } catch (err) {
      appendError();
    }
  }

  function stopRecording(cancel) {
    recordingCanceled = !!cancel;
    document.getElementById('mic-btn').classList.remove('recording');
    document.getElementById('recording-hint').classList.remove('show');
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  }

  async function sendVoiceMessage(blob) {
    if (isBusy) return;
    setBusy(true);
    const userTs = Date.now();

    // Show a temporary placeholder while transcription happens
    appendUser('🎤 Voice message', userTs);
    const tid = appendTyping();

    try {
      const base64Audio = await blobToBase64(blob);
      if (!currentSession) currentSession = { id: newSessionId(), createdAt: Date.now(), title: '', messages: [] };

      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'voice_message',
          audio: base64Audio,
          mimeType: 'audio/webm',
          sessionId: currentSession.id,
          source: 's99_reporting_chatbot'
        })
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      document.getElementById(tid)?.remove();

      // If the backend returns the transcript, swap the placeholder for real text
      if (data.transcript) {
        const lastUserBub = document.querySelectorAll('.msg.u .bub.u');
        if (lastUserBub.length) lastUserBub[lastUserBub.length - 1].textContent = data.transcript;
        if (!currentSession.title) currentSession.title = data.transcript.slice(0, 60);
        currentSession.messages.push({ role: 'user', text: data.transcript, ts: userTs });
      } else {
        currentSession.messages.push({ role: 'user', text: '🎤 Voice message', ts: userTs });
      }

      const reply = data.message || data.reply || data.output || data.text || 'Here\\'s what I found.';
      const botTs = Date.now();
      appendBot(reply, data.buttons, data.source, botTs);
      currentSession.messages.push({ role: 'bot', text: reply, source: data.source, ts: botTs });
      persistCurrentSession();

    } catch (err) {
      document.getElementById(tid)?.remove();
      appendError();
    } finally {
      setBusy(false);
    }
  }

  function initMicButton() {
    const btn = document.getElementById('mic-btn');
    const start = (e) => { e.preventDefault(); startRecording(); };
    const end = (e) => { e.preventDefault(); stopRecording(false); };
    const cancel = (e) => { stopRecording(true); };
    btn.addEventListener('mousedown', start);
    btn.addEventListener('touchstart', start, { passive: false });
    btn.addEventListener('mouseup', end);
    btn.addEventListener('touchend', end);
    btn.addEventListener('mouseleave', cancel);
    btn.addEventListener('touchcancel', cancel);
  }

  /* ═══════════════════════════════════
     INIT
  ═══════════════════════════════════ */
  window.addEventListener('DOMContentLoaded', () => {
    currentSession = { id: newSessionId(), createdAt: Date.now(), title: '', messages: [] };
    renderOpening();
    initMicButton();
    if (window.innerWidth >= 600) document.getElementById('inp').focus();
  });
  window.addEventListener('resize', scrollB);
  document.body.addEventListener('touchmove', (e) => {
    if (!e.target.closest('.msgs') && !e.target.closest('.session-list')) e.preventDefault();
  }, { passive: false });
</script>
